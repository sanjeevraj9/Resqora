<app-user-shell-header></app-user-shell-header>

<div class="tracking-page">

  <div class="tracking-card">

    <div class="top-status">

      <div class="pulse"></div>

      <div>

        <h1 *ngIf="currentStatus === 'SEARCHING'">
          Searching nearest mechanic...
        </h1>

        <h1 *ngIf="currentStatus !== 'SEARCHING'">
          Mechanic Assigned 🚗
        </h1>

        <p *ngIf="mechanicAssigned">
          {{ mechanicName }}
        </p>

      </div>

    </div>

    <!-- PAYMENT STATUS -->
    <div
      class="payment-badge paid"
      *ngIf="request?.paymentStatus === 'PAID'">
      💳 Payment Completed
    </div>

    <div
      class="payment-badge cod"
      *ngIf="request?.paymentStatus === 'CASH_PENDING'">
      💵 Cash On Delivery
    </div>

    <!-- TIMELINE -->
    <div class="timeline">

      <div
        class="step"
        *ngFor="let step of timeline"
        [class.active]="isDone(step)">

        <div class="circle"></div>

        <span>
          {{
            step === 'ON_THE_WAY'
              ? 'On The Way'
              : step === 'IN_PROGRESS'
              ? 'Repair In Progress'
              : step.replace('_', ' ')
          }}
        </span>

      </div>

    </div>

    <!-- CANCEL BUTTON -->
    <button
      class="cancel-btn"
      *ngIf="currentStatus !== 'COMPLETED'"
      (click)="cancelBooking()">
      Cancel Request
    </button>

    <!-- CHAT BUTTON -->
    <button
      class="chat-btn"
      *ngIf="mechanicAssigned"
      (click)="showChat = !showChat">
      {{ showChat ? '❌ Close Chat' : '💬 Chat with Mechanic' }}
    </button>

    <!-- CHAT WINDOW -->
    <div class="chat-wrapper" *ngIf="showChat && mechanicAssigned">
      <app-chat
        [userId]="userId"
        [receiverId]="mechanicId"
        [bookingId]="bookingId">
      </app-chat>
    </div>

    <!-- MAP -->
    <div class="live-map" id="liveMap"></div>

  </div>

  <!-- REVIEW MODAL -->
  <div
    class="review-overlay"
    *ngIf="showReviewModal">

    <div class="review-modal">

      <h2>Service Completed 🎉</h2>

      <p>Rate your mechanic</p>

      <div class="stars">

        <span
          *ngFor="let star of [1,2,3,4,5]"
          (click)="setRating(star)"
          [class.active]="star <= selectedRating">
          ⭐
        </span>

      </div>

      <textarea
        [(ngModel)]="reviewComment"
        placeholder="Write your feedback...">
      </textarea>

      <button
        class="submit-review-btn"
        (click)="submitReview()">
        Submit Review
      </button>

    </div>

  </div>

</div>
