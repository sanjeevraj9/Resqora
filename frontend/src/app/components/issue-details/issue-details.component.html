<app-user-shell-header></app-user-shell-header>

<div class="issue-page">

  <div class="issue-card">

    <!-- SERVICE SUMMARY -->
    <div class="selected-service-card">

      <div class="service-icon">
        🚗
      </div>

      <div class="service-info">

        <h2>
          {{ selectedService || 'Emergency Service' }}
        </h2>

        <p>
          Vehicle Type:
          {{ selectedVehicleType }}
        </p>

      </div>

      <div class="service-price">
        ₹{{ estimatedPrice }}
      </div>

    </div>

    <!-- ISSUE -->
    <h2>Select Problem Type</h2>

    <div class="issue-grid">

     

    </div>

    <!-- BRAND -->
    <div class="desc-box">

      <label>Select Brand</label>

      <select [(ngModel)]="selectedBrand">

        <option value="">
          Choose Brand
        </option>

        <option
          *ngFor="let brand of brands"
          [value]="brand"
        >
          {{ brand }}
        </option>

      </select>

    </div>

    <!-- MODEL -->
    <div class="desc-box">

      <label>Select Model</label>

      <select [(ngModel)]="selectedModel">

        <option value="">
          Choose Model
        </option>

        <option
          *ngFor="let model of models"
          [value]="model"
        >
          {{ model }}
        </option>

      </select>

    </div>

    <!-- DESCRIPTION -->
    <div class="desc-box">

      <label>Describe your issue</label>

      <textarea
        [(ngModel)]="problemDescription"
        placeholder="Explain your problem clearly..."
      >
      </textarea>

    </div>

    <!-- LOCATION -->
    <button
      class="location-btn"
      (click)="getCurrentLocation()"
    >
      📍 Refresh Current Location
    </button>

    <p
      *ngIf="locationFetched"
      class="success-text"
    >
      ✅ Location fetched successfully
    </p>

    <!-- BOOK -->
    <button
      class="continue-btn"
      (click)="continueBooking()"
    >
      Continue to Payment →
    </button>

  </div>

</div>
