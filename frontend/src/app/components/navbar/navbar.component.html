<nav [class.scrolled]="scrolled">
  <a
    routerLink="/"
    class="logo"
  >
    RESQ<span>ORA</span>
  </a>

  <ul class="nav-links">
    <li *ngFor="let link of navLinks">
      <a
        (click)="scrollToSection(link.href)"
      >
        {{ link.label }}
      </a>
    </li>
  </ul>

  <div class="nav-actions">
    <a
      routerLink="/login"
      class="nav-login"
    >
      Sign In
    </a>

    <a
      routerLink="/login"
      class="nav-cta"
    >
      🚨 Book Service
    </a>
  </div>

  <button
    class="hamburger"
    (click)="toggleMobile()"
    aria-label="Menu"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<!-- MOBILE MENU -->
<div
  class="mobile-menu"
  [class.open]="mobileOpen"
>
  <button
    class="close-btn"
    (click)="closeMobile()"
  >
    ✕
  </button>

  <a
    *ngFor="let link of navLinks"
    (click)="scrollToSection(link.href)"
  >
    {{ link.label }}
  </a>

  <a
    routerLink="/login"
    class="mobile-login"
    (click)="closeMobile()"
  >
    Sign In
  </a>

  <a
    routerLink="/login"
    class="mobile-cta"
    (click)="closeMobile()"
  >
    🚨 Book Service Now
  </a>
</div>
