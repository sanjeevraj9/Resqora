<app-mechanic-shell-header></app-mechanic-shell-header>

<p>mechanic-profile works!</p>
<div class="profile-page">



  <!-- PROFILE CARD -->
  <div class="profile-card">

    <div class="profile-header">

      <div class="avatar">
        👨‍🔧
      </div>

      <div>
        <h1>{{ profile.name }}</h1>
        <p>
          ⭐ {{ profile.rating || 5.0 }} Rating
        </p>
      </div>

    </div>

    <!-- STATS -->
    <div class="stats-grid">

      <div class="stat-card">
        <h3>Completed Jobs</h3>
        <p>{{ profile.completedJobs || 0 }}</p>
      </div>

      <div class="stat-card">
        <h3>Total Earnings</h3>
        <p>₹{{ profile.totalEarnings || 0 }}</p>
      </div>

      <div class="stat-card">

  <h3>Status</h3>

  <button
    class="availability-btn"
    [class.offline]="!profile.availability"
    (click)="toggleAvailability()">

    {{
      profile.availability
        ? '🟢 Available'
        : '🔴 Offline'
    }}

  </button>

</div>
    </div>

    <!-- FORM -->
    <div class="form-grid">

      <div class="form-group">
        <label>Name</label>
        <input
          [(ngModel)]="profile.name"
          type="text">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          [value]="profile.email"
          type="email"
          disabled>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input
          [(ngModel)]="profile.phone"
          type="text">
      </div>

      <div class="form-group">
        <label>City</label>
        <input
          [(ngModel)]="profile.city"
          type="text">
      </div>

      <div class="form-group">
        <label>Specialization</label>
        <input
          [(ngModel)]="profile.specialization"
          type="text">
      </div>

      <div class="form-group">
        <label>Experience (Years)</label>
        <input
          [(ngModel)]="profile.experienceYears"
          type="number">
      </div>

    </div>

    <button
      class="save-btn"
      (click)="saveProfile()">

      Save Changes

    </button>

  </div>

</div>
